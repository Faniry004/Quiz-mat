<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    
    <!-- Mode App Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Icône Application (SVG Direct - Fonctionne sans internet) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><path d='M30 20 H70 V35 H45 V50 H65 V65 H45 V85 H30 Z' fill='%23d4af37'/><path d='M75 20 H85 V30 H75 Z' fill='%23f1d592'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><path d='M30 20 H70 V35 H45 V50 H65 V65 H45 V85 H30 Z' fill='%23d4af37'/><path d='M75 20 H85 V30 H75 Z' fill='%23f1d592'/></svg>">

    <!-- Manifeste pour supprimer le logo Chrome de l'icône -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZOUiBNQVRIIEEyIiwKICAic2hvcnRfbmFtZSI6ICJGTlIgTUFUSCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDIwNjE3IiwKICAidGhlbWVfY29sb3IiOiAiIzAyMDYxNyIKfQ==">

    <title>FNR MATH A2</title>
    
    <style>
        /* CSS INTERNE - Pas besoin d'internet */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background-color: #020617; color: #f8fafc; line-height: 1.5; }
        
        header { background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px; position: sticky; top: 0; z-index: 50; }
        .header-content { max-width: 500px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
        .logo-box { width: 40px; height: 40px; background: black; border-radius: 10px; border: 1px solid #d4af37; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gold-text { background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #b59410 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; font-style: italic; }

        main { max-width: 500px; margin: 0 auto; padding: 20px 20px 100px 20px; }
        .card { background: #1e293b; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; margin-bottom: 20px; }
        .card h3 { color: #d4af37; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-size: 18px; }
        .formula-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); font-family: monospace; font-size: 14px; }
        .formula-main { color: #fbbf24; margin-bottom: 5px; }

        /* Navigation */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 10px 25px 10px; display: flex; justify-content: space-around; }
        .nav-btn { background: none; border: none; color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: #d4af37; }
        .nav-btn svg { width: 24px; height: 24px; }

        /* Flashcards */
        .hidden { display: none !important; }
        .flashcard-container { perspective: 1000px; width: 100%; aspect-ratio: 4/5; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flashcard-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; align-items: center; justify-content: center; padding: 30px; text-align: center; font-size: 24px; font-weight: bold; }
        .front { background: #1e293b; border: 2px solid rgba(212,175,55,0.3); color: #d4af37; }
        .back { background: linear-gradient(135deg, #d4af37, #b59410); color: #020617; transform: rotateY(180deg); }
        .controls { display: flex; gap: 15px; width: 100%; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; }
        .btn-prev { background: #334155; color: white; }
        .btn-next { background: linear-gradient(135deg, #d4af37, #b59410); color: #020617; }

        /* Quiz */
        .quiz-card { background: #1e293b; padding: 25px; border-radius: 25px; }
        .opt-btn { width: 100%; text-align: left; padding: 15px; background: #334155; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; color: white; margin-bottom: 12px; font-size: 16px; }
        .correct { background: rgba(34,197,94,0.2) !important; border-color: #22c55e !important; color: #4ade80 !important; }
        .wrong { background: rgba(239,68,68,0.2) !important; border-color: #ef4444 !important; color: #f87171 !important; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" width="30" height="30">
                    <path d="M30 20 H70 V35 H45 V50 H65 V65 H45 V85 H30 Z" fill="#d4af37" />
                    <path d="M75 20 H85 V30 H75 Z" fill="#f1d592" />
                </svg>
            </div>
            <h1 class="gold-text">FNR MATH A2</h1>
        </div>
    </header>

    <main>
        <!-- VUE COURS -->
        <div id="view-guide" class="view">
            <h2 style="margin-bottom:20px;">Révisions</h2>
            <div class="card">
                <h3>Suites Arithmétiques</h3>
                <div class="formula-box">
                    <div class="formula-main">u(n+1) = u(n) + r</div>
                    <div>u(n) = u(0) + n × r</div>
                </div>
            </div>
            <div class="card">
                <h3>Suites Géométriques</h3>
                <div class="formula-box">
                    <div class="formula-main">v(n+1) = v(n) × q</div>
                    <div>v(n) = v(0) × qⁿ</div>
                </div>
            </div>
        </div>

        <!-- VUE CARTES -->
        <div id="view-cards" class="view hidden">
            <h2 style="margin-bottom:20px;">Mémoriser</h2>
            <div id="card-element" class="flashcard-container" onclick="this.classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="front" id="card-f">Raison r ?</div>
                    <div class="back" id="card-b">Nombre que l'on ajoute</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn btn-prev" onclick="prevC()">Précédent</button>
                <button class="btn btn-next" onclick="nextC()">Suivant</button>
            </div>
        </div>

        <!-- VUE QUIZ -->
        <div id="view-quiz" class="view hidden">
            <h2 style="margin-bottom:20px;">Test Rapide</h2>
            <div class="quiz-card">
                <p id="q-txt" style="font-size:18px; font-weight:bold; margin-bottom:20px;"></p>
                <div id="q-opts"></div>
                <button id="next-q-btn" class="btn btn-next hidden" style="width:100%; margin-top:20px;" onclick="nextQ()">Question suivante</button>
            </div>
        </div>
    </main>

    <nav>
        <button onclick="show('guide', this)" class="nav-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            COURS
        </button>
        <button onclick="show('cards', this)" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            CARTES
        </button>
        <button onclick="show('quiz', this)" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
            TEST
        </button>
    </nav>

    <script>
        const cards = [
            {f: "Raison r ?", b: "Nombre ajouté (Suite Arithmétique)"},
            {f: "Raison q ?", b: "Nombre multiplié (Suite Géométrique)"},
            {f: "u(n) Arith.", b: "u(0) + n * r"},
            {f: "v(n) Géo.", b: "v(0) * qⁿ"},
            {f: "Hausse de 5%", b: "Multiplier par 1,05"},
            {f: "Baisse de 10%", b: "Multiplier par 0,90"}
        ];

        const quiz = [
            {q: "u(n) = 3n + 5. Quelle est la raison ?", o: ["3", "5", "8"], c: 0},
            {q: "v(0) = 10 et q = 2. v(1) = ?", o: ["12", "5", "20"], c: 2}
        ];

        let ci = 0, qi = 0;

        function show(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(id === 'cards') updateC();
            if(id === 'quiz') updateQ();
        }

        function updateC() {
            document.getElementById('card-f').innerText = cards[ci].f;
            document.getElementById('card-b').innerText = cards[ci].b;
            document.getElementById('card-element').classList.remove('flipped');
        }
        function nextC() { ci = (ci+1)%cards.length; updateC(); }
        function prevC() { ci = (ci-1+cards.length)%cards.length; updateC(); }

        function updateQ() {
            const d = quiz[qi];
            document.getElementById('q-txt').innerText = d.q;
            const container = document.getElementById('q-opts');
            container.innerHTML = '';
            document.getElementById('next-q-btn').classList.add('hidden');
            d.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => {
                    const btns = container.querySelectorAll('button');
                    btns.forEach(btn => btn.disabled = true);
                    b.classList.add(i === d.c ? 'correct' : 'wrong');
                    document.getElementById('next-q-btn').classList.remove('hidden');
                };
                container.appendChild(b);
            });
        }
        function nextQ() { qi = (qi+1)%quiz.length; updateQ(); }
    </script>
</body>
</html>
